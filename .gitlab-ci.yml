# GitLab CI: build and push the Kitty's Menu image to the project's
# built-in container registry on every push to the default branch or tag.
#
# To use the image in swarm.yaml, replace the `image:` line with:
#   image: ${CI_REGISTRY_IMAGE}:latest
# (or pin to a specific tag / short SHA that this pipeline produces).
stages:
  - build

variables:
  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: "/certs"
  # $CI_REGISTRY_IMAGE is set by GitLab to registry.gitlab.com/<group>/<project>
  # or your self-hosted equivalent. No extra config needed.

build:
  stage: build
  image: docker:27
  services:
    - docker:27-dind
  before_script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY"
  script:
    - docker build
        --tag "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA"
        --tag "$CI_REGISTRY_IMAGE:latest"
        .
    - docker push "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA"
    - docker push "$CI_REGISTRY_IMAGE:latest"
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_TAG
